<!DOCTYPE html>
<html><body>
<!-- Иконки в едином стиле: контурные, оранжевые, 2px stroke -->

<svg width="60" height="60" viewBox="0 0 60 60" fill="none" stroke="#F77C2A" stroke-width="2" stroke-linecap="round">
  <path d="M15 20 Q15 10 30 10 Q45 10 45 20 L42 50 Q40 55 30 55 Q20 55 18 50Z"/>

</body></html>
