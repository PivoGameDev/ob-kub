name: Deploy to Timeweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📂 Emergency deploy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASSWORD }}" \
            -e "set ftp:ssl-allow no; set net:timeout 120; \
                mirror -R -v --no-perms \
                . ./; quit" \
            "${{ secrets.FTP_HOST }}"
