name: Deploy to Timeweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📂 Deploy via FTP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASSWORD }}" \
            -e "set ftp:ssl-allow no; set net:timeout 60; set net:max-retries 3; \
                mirror -R -v --delete --no-perms \
                --exclude ^.git/ \
                --exclude ^.gitignore$ \
                --exclude ^.github/ \
                --exclude ^_local/ \
                --exclude urls.txt \
                --exclude test.php \
                --exclude test.html \
                --exclude Сравнение_с_рынком.txt \
                . ./; quit" \
            "${{ secrets.FTP_HOST }}"
