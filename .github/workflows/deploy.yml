name: Deploy to Timeweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📂 Deploy via FTP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASSWORD }}" -e "mirror -R -v ./ ./ --verbose --exclude .git/ --exclude .gitignore --exclude .github/ --exclude _local/ --exclude urls.txt --exclude test.php --exclude test.html ; quit" "${{ secrets.FTP_HOST }}"
