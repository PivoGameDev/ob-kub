<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:40px;font-family:'Source Sans Pro',sans-serif;background:#f5f6f8;color:#333;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto;background:linear-gradient(135deg,#1a1a26,#2b2b39);border-radius:16px;padding:40px 44px}
.tabs{display:flex;gap:10px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.tab{padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.tab.active{background:#F77C2A;color:#fff}
.banner{position:relative;border-radius:12px;overflow:hidden;min-height:400px;background:#1a1a26}
.banner img{position:absolute;width:100%;height:100%;object-fit:cover}
.banner .over{position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,26,38,.92),rgba(26,26,38,.3));z-index:2}
.banner .in{position:relative;z-index:3;padding:30px}
.title{font-size:26px;font-weight:800;color:#fff;margin:0 0 4px}
.sub{color:rgba(255,255,255,.5);margin:0 0 16px}
.info{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.info-item{background:rgba(255,255,255,.06);border-radius:6px;padding:6px 14px;color:#fff;font-weight:600;font-size:13px}
.desc{color:rgba(255,255,255,.5);font-size:13px;line-height:1.5;margin-bottom:16px}
.products{display:flex;gap:8px;overflow-x:auto}
.products div{flex:0 0 110px;background:#fff;border-radius:6px;overflow:hidden}
.products img{width:100%;height:80px;object-fit:contain;display:block;background:#fff;padding:4px}
.products span{display:block;padding:4px 6px;font-size:10px;color:#444;font-weight:600;text-align:center;border-top:1px solid #eee}
</style>
</head>
<body>
<div class="wrap">
<div style="text-align:center;color:rgba(255,255,255,.5);font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#F77C2A;font-weight:600">Каталог</div>
<h2 style="text-align:center;font-size:24px;font-weight:800;color:#fff;margin:6px 0 20px">Оборудование по отраслям</h2>

<div class="tabs">
<button class="tab active" onclick="show(0)">🥛 Молочное</button>
<button class="tab" onclick="show(1)">🍷 Винодельческое</button>
<button class="tab" onclick="show(2)">🍺 Пивоваренное</button>
<button class="tab" onclick="show(3)">💧 Вода</button>
<button class="tab" onclick="show(4)">🫒 Масло</button>
<button class="tab" onclick="show(5)">🍯 Кондитерская</button>
</div>

<div class="banner">
<img id="bg" src="banner-dairy.jpg"><div class="over"></div>
<div class="in">
<div class="title" id="ttl">🥛 Молочное</div>
<div class="sub" id="ssub">Оборудование для молочной промышленности</div>
<div class="info"><span id="vvol">500 – 200 000 л</span><span>AISI 304 / 316</span><span style="color:#F77C2A" id="ppr">от 195 000 ₽</span></div>
<div class="desc" id="ddesc">Оборудование для молочной промышленности: ёмкости приёмки и хранения, резервуары-охладители, ВДП, ферментационные танки, сыро- и творогоизготовители.</div>
<div class="products" id="pprod"></div>
</div></div></div>

<script>
var data = [
  {img:"banner-dairy.jpg",title:"🥛 Молочное",sub:"Оборудование для молочной промышленности",vol:"500 – 200 000 л",price:"от 195 000 ₽",desc:"Оборудование для молочной промышленности: ёмкости приёмки и хранения, резервуары-охладители, ВДП, ферментационные танки, сыро- и творогоизготовители.",prod:'<div><img src="dairy-reception.jpg"><span>Приёмка</span></div><div><img src="dairy-storage.jpg"><span>Хранение</span></div><div><img src="dairy-cooler.jpg"><span>Охладитель</span></div><div><img src="dairy-vdp.jpg"><span>ВДП</span></div><div><img src="dairy-fermentation.jpg"><span>Ферментация</span></div><div><img src="dairy-cheese-maker.jpg"><span>Сыроизготовитель</span></div><div><img src="dairy-cottage-cheese.jpg"><span>Творог</span></div><div><img src="dairy-yeast.jpg"><span>Заквасочник</span></div>'},
  {img:"banner-wine.jpg",title:"🍷 Винодельческое",sub:"Танки для ферментации и хранения",vol:"500 – 50 000 л",price:"от 280 000 ₽",desc:"Винодельческое оборудование: ферментационные танки для красных и белых вин, выдержка, криостабилизация, купажирование.",prod:'<div><img src="wine-red-fermentation.jpg"><span>Красные</span></div><div><img src="wine-white-fermentation.jpg"><span>Белые</span></div><div><img src="wine-storage-aging.jpg"><span>Выдержка</span></div><div><img src="wine-cold-stabilization.jpg"><span>Криостат</span></div><div><img src="wine-universal-tank.jpg"><span>Винификатор</span></div>'},
  {img:"banner-beer.jpg",title:"🍺 Пивоваренное",sub:"ЦКТ, варочные порядки и оборудование",vol:"100 – 200 000 л",price:"от 94 000 ₽",desc:"Полный цикл пивоваренного оборудования: ЦКТ, варочные порядки, дробилки, БГВ, парогенераторы, чиллеры.",prod:'<div><img src="cct-tank.jpg"><span>ЦКТ</span></div><div><img src="brew-kettle.jpg"><span>Варочный</span></div><div><img src="beer-hot-water-tank.jpg"><span>БГВ</span></div><div><img src="steam-generator.jpg"><span>Парогенератор</span></div><div><img src="unitank.jpg"><span>Форфас</span></div>'},
  {img:"banner-water.jpg",title:"💧 Для воды",sub:"Баки горячей воды и резервуары",vol:"250 – 50 000 л",price:"от 150 000 ₽",desc:"Резервуары для воды: баки горячей воды, ёмкости хранения, терморегулируемые ёмкости.",prod:'<div><img src="hot-water-tank.jpg"><span>Бак воды</span></div><div><img src="industrial-storage.jpg"><span>Хранение</span></div>'},
  {img:"banner-oil.jpg",title:"🫒 Для масла",sub:"Ёмкости с мешалкой и хранения",vol:"500 – 50 000 л",price:"от 220 000 ₽",desc:"Ёмкости для пищевых масел: резервуары хранения, ёмкости с мешалкой, терморегулируемые танки.",prod:'<div><img src="industrial-mixing.jpg"><span>Мешалка</span></div><div><img src="industrial-storage.jpg"><span>Хранение</span></div>'},
  {img:"banner-conf.jpg",title:"🍯 Кондитерская",sub:"Ёмкости для глазурей и сиропов",vol:"500 – 20 000 л",price:"от 200 000 ₽",desc:"Оборудование для кондитерской: ёмкости с мешалкой для глазурей, сиропов, начинок.",prod:'<div><img src="industrial-mixing.jpg"><span>Мешалка</span></div><div><img src="industrial-thermal.jpg"><span>Термо</span></div>'}
];
function show(i){
  var d=data[i];
  document.querySelectorAll('.tab').forEach(function(t,j){t.className='tab'+(j===i?' active':'')});
  document.getElementById('bg').src=d.img;
  document.getElementById('ttl').textContent=d.title;
  document.getElementById('ssub').textContent=d.sub;
  document.getElementById('vvol').textContent=d.vol;
  document.getElementById('ppr').textContent=d.price;
  document.getElementById('ddesc').textContent=d.desc;
  document.getElementById('pprod').innerHTML=d.prod;
}
show(0);
</script>
</body>
</html>
